<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Level 1</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#090909;
height:100vh;
overflow:hidden;
color:white;
}

.header{
position:absolute;
top:50px;
left:50%;
transform:translateX(-50%);
text-align:center;
}

.counter{
font-size:60px;
font-weight:700;
}

.small{
color:#666;
}

.orb{
position:absolute;
width:80px;
height:80px;
border-radius:50%;
background:white;
cursor:pointer;
box-shadow:
0 0 60px rgba(255,255,255,.6);
}

.next{
display:none;
position:absolute;
bottom:60px;
left:50%;
transform:translateX(-50%);
padding:15px 40px;
border:none;
border-radius:999px;
cursor:pointer;
font-weight:600;
}

</style>
</head>
<body>

<div class="header">

<div class="counter" id="counter">
0 / 15
</div>

<div class="small">
Catch the orb
</div>

</div>

<div class="orb" id="orb"></div>

<button class="next" id="next"
onclick="location.href='gallery.html'">
Weiter
</button>

<script>

const orb =
document.getElementById("orb");

const counter =
document.getElementById("counter");

const next =
document.getElementById("next");

let score = 0;

function moveOrb(){

orb.style.left =
Math.random()*
(window.innerWidth-100)+"px";

orb.style.top =
Math.random()*
(window.innerHeight-100)+"px";

}

orb.addEventListener("click",()=>{

score++;

counter.innerText =
score+" / 15";

if(score >= 15){

orb.style.display="none";

counter.innerText =
"Level Complete";

next.style.display=
"block";

return;

}

moveOrb();

});

moveOrb();

</script>

</body>
</html>
