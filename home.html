<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Since</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#090909;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:900px;
max-width:90%;
background:#111;
border:1px solid #222;
padding:50px;
border-radius:30px;
}

.top{
color:#666;
margin-bottom:15px;
}

.days{
font-size:120px;
font-weight:700;
line-height:1;
}

.time{
display:flex;
gap:40px;
margin-top:25px;
}

.unit{
font-size:40px;
font-weight:600;
}

.label{
color:#666;
font-size:14px;
}

button{
margin-top:40px;
padding:15px 35px;
border:none;
background:white;
color:black;
border-radius:999px;
cursor:pointer;
font-weight:600;
}

</style>
</head>
<body>

<div class="card">

<div class="top">
Together since 22.02.2026
</div>

<div class="days" id="days">
0
</div>

<div>Tage</div>

<div class="time">

<div>
<div class="unit" id="hours">0</div>
<div class="label">STUNDEN</div>
</div>

<div>
<div class="unit" id="minutes">0</div>
<div class="label">MINUTEN</div>
</div>

<div>
<div class="unit" id="seconds">0</div>
<div class="label">SEKUNDEN</div>
</div>

</div>

<button onclick="location.href='game.html'">
Weiter
</button>

</div>

<script>

const startDate =
new Date("2026-02-22T00:00:00");

function update(){

const now = new Date();

const diff = now - startDate;

const days =
Math.floor(diff/(1000*60*60*24));

const hours =
Math.floor((diff%(1000*60*60*24))/(1000*60*60));

const minutes =
Math.floor((diff%(1000*60*60))/(1000*60));

const seconds =
Math.floor((diff%(1000*60))/1000);

document.getElementById("days").innerText=days;
document.getElementById("hours").innerText=hours;
document.getElementById("minutes").innerText=minutes;
document.getElementById("seconds").innerText=seconds;

}

update();
setInterval(update,1000);

</script>

</body>
</html>
