<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsere Zeit ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#7c3aed);
    overflow:hidden;
}

.card{
    width:90%;
    max-width:700px;
    padding:50px;
    text-align:center;
    border-radius:30px;
    backdrop-filter:blur(25px);
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);
    color:white;
    box-shadow:0 25px 50px rgba(0,0,0,.3);
}

h1{
    margin-bottom:15px;
    font-size:2.5rem;
}

.subtitle{
    color:rgba(255,255,255,.75);
    margin-bottom:35px;
}

.timer{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    margin-bottom:40px;
}

.box{
    background:rgba(255,255,255,.08);
    padding:20px;
    border-radius:18px;
}

.number{
    font-size:2rem;
    font-weight:700;
}

.label{
    opacity:.7;
    font-size:.9rem;
}

.next-btn{
    padding:15px 40px;
    border:none;
    border-radius:15px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,#8b5cf6,#ec4899);
    transition:.3s;
}

.next-btn:hover{
    transform:translateY(-3px);
}
</style>
</head>

<body>

<div class="card">

    <h1>❤️ Unsere gemeinsame Zeit ❤️</h1>

    <p class="subtitle">
        Seit dem 22.02.2026 zusammen
    </p>

    <div class="timer">
        <div class="box">
            <div class="number" id="days">0</div>
            <div class="label">Tage</div>
        </div>

        <div class="box">
            <div class="number" id="hours">0</div>
            <div class="label">Stunden</div>
        </div>

        <div class="box">
            <div class="number" id="minutes">0</div>
            <div class="label">Minuten</div>
        </div>

        <div class="box">
            <div class="number" id="seconds">0</div>
            <div class="label">Sekunden</div>
        </div>
    </div>

    <button class="next-btn" onclick="window.location.href='seite2.html'">
        Weiter →
    </button>

</div>

<script>

const startDate = new Date("2026-02-22T00:00:00");

function updateTimer(){

    const now = new Date();
    const diff = now - startDate;

    const days = Math.floor(diff / (1000*60*60*24));

    const hours = Math.floor(
        (diff % (1000*60*60*24))
        / (1000*60*60)
    );

    const minutes = Math.floor(
        (diff % (1000*60*60))
        / (1000*60)
    );

    const seconds = Math.floor(
        (diff % (1000*60))
        / 1000
    );

    document.getElementById("days").textContent = days;
    document.getElementById("hours").textContent = hours;
    document.getElementById("minutes").textContent = minutes;
    document.getElementById("seconds").textContent = seconds;
}

updateTimer();
setInterval(updateTimer,1000);

</script>

</body>
</html>
