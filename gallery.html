<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moments</title>

<style>
body{
margin:0;
background:#0a0a0a;
color:white;
font-family:Inter,sans-serif;
}

.container{
max-width:900px;
margin:auto;
padding:60px 20px;
}

.card{
margin-bottom:100px;
}

img{
width:100%;
border-radius:20px;
display:block;
box-shadow:0 20px 60px rgba(0,0,0,.5);
}

.text{
margin-top:15px;
font-size:18px;
color:#ccc;
line-height:1.5;
}

.end{
text-align:center;
padding:80px 20px;
color:#777;
font-size:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<img src="bild1.jpg">
<div class="text">
Eines meiner Lieblingsbilder. Nicht perfekt — aber echt.
</div>
</div>

<div class="card">
<img src="bild2.jpg">
<div class="text">
Manchmal schaue ich dich an und denke: wie kann jemand so besonders sein.
</div>
</div>

</div>

<div class="end">
Und das hier ist erst der Anfang ❤️
</div>

</body>
</html>
