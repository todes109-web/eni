<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moments</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#090909;
color:white;
}

.section{
max-width:900px;
margin:auto;
padding:80px 20px;
}

.card{
margin-bottom:120px;
}

img{
width:100%;
border-radius:24px;
display:block;
box-shadow:0 20px 60px rgba(0,0,0,.4);
}

.text{
margin-top:25px;
font-size:22px;
line-height:1.6;
color:#d0d0d0;
}

.final{
text-align:center;
padding:100px 20px;
}

.final h1{
font-size:48px;
margin-bottom:20px;
}

.final p{
font-size:22px;
color:#888;
}

</style>
</head>
<body>

<div class="section">

<div class="card">

<img src="bilder/bild1.jpg">

<div class="text">
Eines meiner Lieblingsbilder. Nicht weil es perfekt ist,
sondern weil es einfach du bist.
</div>

</div>

<div class="card">

<img src="bilder/bild2.jpg">

<div class="text">
Manchmal schaue ich dich an und frage mich,
wie ich so viel Glück haben konnte.
</div>

</div>

</div>

<div class="final">

<h1>❤️</h1>

<p>
Und das Beste daran?
Das hier ist erst der Anfang.
</p>

</div>

</body>
</html>
