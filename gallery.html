<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moments</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#0a0a0a;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:80px 20px;
}

.card{
margin-bottom:120px;
}

img{
width:100%;
border-radius:24px;
box-shadow:0 20px 60px rgba(0,0,0,.5);
display:block;
}

.text{
margin-top:20px;
font-size:20px;
color:#cfcfcf;
line-height:1.6;
}

.end{
text-align:center;
padding:100px 20px;
color:#888;
}

</style>
</head>
<body>

<div class="container">

<!-- Bild 1 -->
<div class="card">
<img src="data:image/png;base64,bild1.jpg">
<div class="text">
Eines meiner Lieblingsbilder. Nicht weil es perfekt ist, sondern weil es einfach du bist.
</div>
</div>

<!-- Bild 2 -->
<div class="card">
<img src="data:image/jpeg;base64,bild2.jpg">
<div class="text">
Manchmal schaue ich dich an und frage mich, wie ich so viel Glück haben konnte.
</div>
</div>

</div>

<div class="end">
Und das hier ist erst der Anfang ❤️
</div>

</body>
</html>
