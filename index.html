<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #7c3aed
    );
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#9333ea;
    border-radius:50%;
    filter:blur(150px);
    top:-150px;
    left:-150px;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#ec4899;
    border-radius:50%;
    filter:blur(150px);
    bottom:-150px;
    right:-150px;
}

.login-box{
    position:relative;
    z-index:10;
    width:420px;
    padding:40px;
    border-radius:25px;
    backdrop-filter:blur(25px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 25px 50px rgba(0,0,0,0.3);
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{
    color:white;
    font-size:32px;
}

.logo p{
    color:rgba(255,255,255,0.7);
    font-size:14px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    color:white;
    margin-bottom:8px;
    font-size:14px;
}

.input-group input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,0.1);
    color:white;
    font-size:15px;
}

.input-group input::placeholder{
    color:rgba(255,255,255,0.5);
}

.login-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(
        135deg,
        #8b5cf6,
        #ec4899
    );
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.login-btn:hover{
    transform:translateY(-2px);
}

.error{
    text-align:center;
    margin-top:15px;
    color:#ffb4b4;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:rgba(255,255,255,0.6);
    font-size:13px;
}
</style>
</head>

<body>

<div class="login-box">

    <div class="logo">
        <h1>Willkommen</h1>
        <p>Bitte melde dich an</p>
    </div>

    <div class="input-group">
        <label>Benutzername</label>
        <input
            type="text"
            id="username"
            placeholder="Benutzername">
    </div>

    <div class="input-group">
        <label>Passwort</label>
        <input
            type="password"
            id="password"
            placeholder="Passwort">
    </div>

    <button class="login-btn" onclick="login()">
        Anmelden
    </button>

    <div class="error" id="error"></div>

    <div class="footer">
        Private Access
    </div>

</div>

<script>
function login(){

    const username =
        document.getElementById("username").value;

    const password =
        document.getElementById("password").value;

    if(
        username === "Joel" &&
        password === "22.02.2026"
    ){
        window.location.href = "home.html";
    }else{
        document.getElementById("error").innerHTML =
        "Benutzername oder Passwort falsch";
    }
}
</script>

</body>
</html>
